<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cab Fare Predictor</title>
   <style>
    body {
      font-family: Arial, sans-serif;
      background: radial-gradient(circle,silver, black);
      background-repeat: no-repeat;
      text-align: center;
    }

    input {
      margin: 5px;
      padding: 8px;
      border-radius: 5px;
      border: 1px solid #740707;
    }

    button {
      background-color: #000307;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0ab623;
    }

    h3 {
      color: rgb(195, 213, 195);
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      font-size: larger;
      font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
    }

    h2 {
      color: #0641f1;
      border: none;
      padding: 10px 20px;
      border-radius: 5px;
      font-size: 35px;
      font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
    }

    label {
      color:rgb(3, 0, 1);
      border: none;
      padding: 3px 2px;
      border-radius: 5px;
      font-size: large;
      font-family: 'Times New Roman', Times, serif;
    }
  </style>
</head>
<body>
  <h2>Cab Fare Prediction</h2>

  <!-- Pickup/Dropoff Coordinates -->
  <label>Pickup Latitude:</label>
  <input type="number" id="pickup_lat" step="0.000001" placeholder="e.g. 40.7128"><br><br>

  <label>Pickup Longitude:</label>
  <input type="number" id="pickup_long" step="0.000001" placeholder="-74.0060"><br><br>

  <label>Dropoff Latitude:</label>
  <input type="number" id="dropoff_lat" step="0.000001" placeholder="40.7769"><br><br>

  <label>Dropoff Longitude:</label>
  <input type="number" id="dropoff_long" step="0.000001" placeholder="-73.8740"><br><br>

  <!-- Date and Time -->
  <label>Pickup Date:</label>
  <input type="date" id="pickup_date"><br><br>

  <label>Pickup Time:</label>
  <input type="time" id="pickup_time"><br><br>

  <label>Trip Duration:</label>
  <input type="number" id="trip_duration" placeholder="47"><br><br>

  <button onclick="predictFare()">Predict Fare</button>

  <h3 id="result"></h3>

  <script>
  // Haversine formula to calculate distance between two coordinates
  function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371; // Earth's radius in km
    const toRad = (deg) => deg * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a =
      Math.sin(dLat / 2) ** 2 +
      Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
      Math.sin(dLon / 2) ** 2;
    const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    return R * c; // distance in km
  }

  // Check if weekend/holiday
  function isWeekendOrHoliday(date) {
    const day = date.getDay(); // 0 = Sunday, 6 = Saturday
    return (day === 0 || day === 6) ? 1 : 0;
  }

  async function predictFare() {
    try {
      const pickup_latitude = parseFloat(document.getElementById('pickup_lat').value);
      const pickup_longitude = parseFloat(document.getElementById('pickup_long').value);
      const dropoff_latitude = parseFloat(document.getElementById('dropoff_lat').value);
      const dropoff_longitude = parseFloat(document.getElementById('dropoff_long').value);

      const pickup_date = new Date(document.getElementById('pickup_date').value + 'T' + document.getElementById('pickup_time').value);
      
      // Calculate distance
      const trip_distance = haversine(pickup_latitude, pickup_longitude, dropoff_latitude, dropoff_longitude);

      // Extract hour of day
      const hour_of_day = pickup_date.getHours();

      // Weekend or holiday
      const is_weekend_or_holiday = isWeekendOrHoliday(pickup_date);
    
      // Trip duration
      const trip_duration_min = parseFloat(document.getElementById('trip_duration').value);
      //Value check
      if (isNaN(pickup_latitude) || isNaN(pickup_longitude) || isNaN(dropoff_latitude) || isNaN(dropoff_longitude) || isNaN(trip_duration_min)) {
        alert('Please fill in all fields with valid numbers');
        return;
      }

      // Send to Flask
      const response = await fetch('http://127.0.0.1:5000/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          pickup_latitude,
          pickup_longitude,
          dropoff_latitude,
          dropoff_longitude,
          trip_distance,
          hour_of_day,
          trip_duration_min,
          is_weekend_or_holiday
        })
      });

      const data = await response.json();

      if (data.error) {
        document.getElementById('result').innerText = `Error: ${data.error}`;
      } else {
        document.getElementById('result').innerText = `Predicted Fare: $${data.predicted_fare.toFixed(2)}`;
      }

    } catch (err) {
      document.getElementById('result').innerText = `Request failed: ${err}`;
    }
  }
</script>
</body>
</html>
