<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cab Fare Predictor</title>
  <style>
    /* Background animation */
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(-45deg, #6a11cb, #2575fc, #ffb347, #ffcc70);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      color: #fff;
    }

    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    h1 {
      margin-top: 50px;
      font-size: 3rem;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
    }

    .main_btns {
        padding-top: 80px;
        padding-bottom: 130px;
        display: flex;
        gap: 40px;
    }

    /* Button styles */
    .btn {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 220px;
    height: 60px;
    border: 3px solid transparent;
    border-radius: 12px;
    cursor: pointer;
    font-size: 1.2rem;
    font-weight: bold;
    color: #fff;
    text-decoration: none;
    background: rgba(255, 255, 255, 0.1);
    overflow: hidden;
    transition: transform 0.3s, box-shadow 0.3s, color 0.3s;
  }

  .btn::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 12px;
    padding: 3px;
    background: linear-gradient(90deg, #2575fc, #ff512f, #6a11cb, #2575fc);
    background-size: 300% 300%;
    animation: borderShift 6s linear infinite;
    -webkit-mask:
      linear-gradient(#fff 0 0) content-box,
      linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
  }

  @keyframes borderShift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .btn:hover {
    transform: scale(1.05) translateY(-3px);
    box-shadow: 0 8px 15px rgba(0,0,0,0.3);
    color: black;
    background: rgba(255, 255, 255, 0.8);
  }

  .btn img {
    height: 36px;
    transition: transform 0.3s;
  }

  .btn:hover img {
    transform: scale(1.2);
  }

    .btn svg {
      width: 36px;
      height: 36px;
      transition: transform 0.3s;
    }

    .btn:hover svg {
      transform: scale(1.2);
    }

    /* Feature cards */
    .features {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 50px;
      max-width: 1000px;
    }

    .feature-card {
      background: rgba(255,255,255,0.2);
      border-radius: 15px;
      padding: 20px;
      margin: 15px;
      width: 220px;
      text-align: center;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.8s forwards;
    }

    .feature-card:nth-child(1) { animation-delay: 0.2s; }
    .feature-card:nth-child(2) { animation-delay: 0.4s; }
    .feature-card:nth-child(3) { animation-delay: 0.6s; }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

  </style>
</head>
<body>
  <h1>Cab Fare Predictor</h1>

  <div class="main_btns">
    <a href="/login" class="btn">
      <!-- Embed undraw_login_weas.svg -->
      <img src="undraw_login_weas.svg" alt="Login" style="height:36px;">
      Login
    </a>

    <a href="/signup" class="btn">
      <!-- Embed undraw_sign-up_z2ku.svg -->
      <img src="undraw_sign-up_z2ku.svg" alt="Sign Up" style="height:36px;">
      Sign Up
    </a>
  </div>

  <div class="features">
    <div class="feature-card">Predict fares instantly</div>
    <div class="feature-card">Plan your trips easily</div>
    <div class="feature-card">Save your ride history</div>
  </div>
</body>
</html>
