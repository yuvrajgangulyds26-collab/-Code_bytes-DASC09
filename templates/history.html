<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ride History</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      margin: 0;
      padding: 0;
      height: 100vh;
      background: linear-gradient(45deg, #ff5900ff, #0819b4ff);
      background-repeat: no-repeat;
      background-size: cover;
      background-attachment: fixed;
      font-family: 'Lato' 'Times New Roman';
      color: black;
    }

    h2 {
      font-family: 'Roboto';
      height:35px;
      background: linear-gradient(90deg, #410867ff, #094bd0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: transparent;
      font-weight: 700;
      text-align: center;
      margin-bottom: 1rem;
    }

    .container {
      background: linear-gradient(60deg, #b3ff00ff, #b48308ff);
    }
    .btn-primary {
      background: blue;
      color: white;
      box-shadow: 0 4px 10px rgba(31, 59, 246, 0.15);
      transition: background 0.3s, color 0.3s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      background: red;
      color: black;
      cursor: pointer;
      box-shadow: 0 4px 10px rgba(0,0,0,0.8);
    }

  </style>
</head>
<body>
  <div class="container mt-4">
    <h2 class="mb-4">Ride History</h2>
    <table class="table table-striped">
      <thead>
        <tr>
          <th>#</th>
          <th>Pickup</th>
          <th>Dropoff</th>
          <th>Distance (km)</th>
          <th>Duration (min)</th>
          <th>Fare ($)</th>
          <th>Date</th>
        </tr>
      </thead>
      <tbody id="historyBody">
        <tr><td colspan="7" class="text-center">Loading...</td></tr>
      </tbody>
    </table>
    <a href="/dashboard" class="btn btn-primary">Back to Dashboard</a>
  </div>

  <script>
    async function loadHistory() {
      try {
        const res = await fetch('/api/history');
        const data = await res.json();
        const tbody = document.getElementById('historyBody');
        tbody.innerHTML = '';

        if(data.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7" class="text-center">No rides yet.</td></tr>';
          return;
        }

        data.forEach((ride, index) => {
          const row = document.createElement('tr');
          row.innerHTML = `
            <td>${index + 1}</td>
            <td>${ride.pickup}</td>
            <td>${ride.dropoff}</td>
            <td>${ride.trip_distance}</td>
            <td>${ride.trip_duration_min}</td>
            <td>${ride.predicted_fare}</td>
            <td>${ride.created_at}</td>
          `;
          tbody.appendChild(row);
        });
      } catch(err) {
        console.error('Failed to load history:', err);
      }
    }

    loadHistory();
  </script>
</body>
</html>
