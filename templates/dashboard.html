<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eCab Dashboard</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://unpkg.com/maplibre-gl@3.6.0/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@3.6.0/dist/maplibre-gl.js"></script>

  <style>
    body {
      background: #f5f7fb;
      font-family: 'Poppins', sans-serif;
      color: #333;
      transition: background 0.3s, color 0.3s;
    }

    .navbar {
      background: linear-gradient(90deg, #ffbb00ff, #6dd200ff);
      box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    }
    .navbar-brand, .navbar-text {
      color: white !important;
    }

    .card {
      border: none;
      border-radius: 18px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.1);
      padding: 2rem;
      transition: background 0.3s, color 0.3s;
    }

    h4 {
      background: linear-gradient(90deg, #00fff7ff, #c307fdff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: transparent;
      font-weight: 700;
      text-align: center;
      margin-bottom: 1.5rem;
    }

    #map {
      height: 300px;
      border-radius: 12px;
      margin-bottom: 20px;
    }

    .form-label {
      font-weight: 500;
    }

    .btn-primary {
      font-family: 'Ubuntu';
      border-radius: 12px;
      background: linear-gradient(90deg, #007bff, #0056d2);
      border: none;
      transition: all 0.3s ease;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      background: linear-gradient(90deg, #ff0000ff, #62d200ff);
      color: black;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .btn-danger {
      font-family: 'Roboto';
      border-radius: 10px;
      border: none;
      background: linear-gradient(-90deg, #080808ff, #454644ff);
      color: white;
      transition: all 0.3s ease;
    }

    .btn-danger:hover {
      transform: translateY(-2px);
      background: linear-gradient(90deg,rgba(248, 6, 6, 1), rgba(227, 135, 7, 0.7));
      color: black;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .btn-light {
      font-family: 'Roboto';
      border-radius: 10px;
      border: none;
      background: linear-gradient(-90deg, #faf8f8ff, #c4d2b5ff);
      color: black;
      transition: all 0.3s ease;
    }

    .btn-light:hover {
      transform: translateY(-2px);
      background: linear-gradient(90deg,rgba(8, 8, 8, 1), rgba(57, 56, 54, 0.7));
      color: white;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .result-box {
      display: none;
      background: #e9f7ef;
      border-radius: 10px;
      padding: 1rem;
      margin-top: 1.5rem;
      border-left: 5px solid #663ff1ff;
      transition: background 0.3s, color 0.3s;
    }

    .search-box {
      position: relative;
    }

    .autocomplete-list {
      position: absolute;
      top: 100%; left: 0; right: 0;
      z-index: 9999;
      background: white;
      border: 1px solid #ddd;
      border-radius: 8px;
      max-height: 180px;
      overflow-y: auto;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }
    .autocomplete-list div {
      padding: 8px 12px;
      cursor: pointer;
    }
    .autocomplete-list div:hover {
      background: #ff6a00ff;
      color: white;
    }

    /* Dark Mode */
    body.dark-mode {
      background: #121212;
      color: #ddd;
    }
    body.dark-mode .card {
      background: #1f1f1f;
      color: #ddd;
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    }
    body.dark-mode .result-box {
      background: #2c2c2c;
      border-left-color: #22a8ddff;
      color: #ddd;
    }
    body.dark-mode .autocomplete-list {
      background: #2c2c2c;
      color: #ddd;
      border-color: #444;
    }
    body.dark-mode .autocomplete-list div:hover {
      background: #4285e2ff;
    }

    body.dark-mode h4 {
      background: linear-gradient(90deg, #ff6a00, #ee0979);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: transparent;
      font-weight: 700;
      text-align: center;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="#"><img src="undraw_order-a-car_x5mq_2.svg" alt="🚖" style="height:36px;"> eCab Dashboard<img src="undraw_vintage_q09n.svg" alt="🚖" style="height:36px;"</a>
      <div class="d-flex ms-auto align-items-center">
        <span class="navbar-text me-3"><b>{{ user_name }}</b> </span>
        <button id="darkModeToggle" class="btn btn-outline-light btn-sm me-2">🌙 Dark Mode</button>
        <a href="/history" class="btn btn-light btn-sm me-2"><img src="undraw_season-change_ohe6.svg" alt="" style="height:36px;">History</a>
        <a href="/logout" class="btn btn-danger btn-sm"><img src="undraw_log-out_2vod.svg" alt="" style="height:36px;">Logout</a>
      </div>
    </div>
  </nav>

  <div class="container mt-4">
    <div class="card">
      <h4>Cab Fare Estimation</h4>

      <!-- Pickup & Dropoff -->
      <div class="row mb-3">
        <div class="col-md-6">
          <label class="form-label">Pickup Location</label>
          <div class="search-box">
            <input type="text" id="pickup" class="form-control" placeholder="Search pickup..." autocomplete="off">
            <div id="pickup-suggestions" class="autocomplete-list"></div>
          </div>
        </div>
        <div class="col-md-6">
          <label class="form-label">Dropoff Location</label>
          <div class="search-box">
            <input type="text" id="dropoff" class="form-control" placeholder="Search dropoff..." autocomplete="off">
            <div id="dropoff-suggestions" class="autocomplete-list"></div>
          </div>
        </div>
      </div>

      <!-- Map -->
      <div id="map"></div>

      <!-- Trip Info -->
      <form id="predictForm">
        <input type="hidden" id="pickup_latitude">
        <input type="hidden" id="pickup_longitude">
        <input type="hidden" id="dropoff_latitude">
        <input type="hidden" id="dropoff_longitude">

        <div class="row g-3">
          <div class="col-md-6">
            <label class="form-label">Trip Distance (km)</label>
            <input type="number" step="0.01" class="form-control" id="trip_distance" readonly required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Trip Duration (min)</label>
            <input type="number" class="form-control" id="trip_duration_min" readonly required>
          </div>
        </div>

        <div class="text-center mt-4">
          <button type="submit" class="btn btn-primary px-4 py-2">Predict Fare</button>
        </div>
      </form>

      <div class="result-box text-center mt-4">
        <h5 class="text-success fw-bold">Estimated Fare: $ <span id="predictedFare"></span></h5>
      </div>
    </div>
  </div>

  <script>
    // ========== Map Setup ==========
    const map = new maplibregl.Map({
      container: 'map',
      style: 'https://api.maptiler.com/maps/streets/style.json?key=L8UyX3M5BbrojjqNOfDc',
      center: [-73.9654, 40.7829],
      zoom: 12
    });

    let pickupMarker, dropoffMarker;
    let selecting = "pickup";

    // ========== Autocomplete ==========
    let debounceTimer;
    async function fetchSuggestions(query, listId) {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(async () => {
        if (query.length < 3) {
          document.getElementById(listId).innerHTML = "";
          return;
        }
        try {
          const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=5`);
          const data = await res.json();
          const list = document.getElementById(listId);
          list.innerHTML = "";
          data.forEach(place => {
            const div = document.createElement("div");
            div.textContent = place.display_name;
            div.onclick = () => selectPlace(place, listId);
            list.appendChild(div);
          });
        } catch (err) {
          console.error("Autocomplete failed:", err);
        }
      }, 300);
    }

    async function reverseGeocode(lat, lon) {
      try {
        const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
        const data = await res.json();
        return data.display_name || "Unknown location";
      } catch {
        return "Unknown location";
      }
    }

    async function selectPlace(place, listId) {
      const lat = parseFloat(place.lat);
      const lon = parseFloat(place.lon);
      const display = place.display_name;

      if (listId.includes("pickup")) setPickup(lat, lon, display);
      else setDropoff(lat, lon, display);

      document.getElementById(listId).innerHTML = "";
      updateRoute();
    }

    document.getElementById("pickup").addEventListener("input", e => fetchSuggestions(e.target.value, "pickup-suggestions"));
    document.getElementById("dropoff").addEventListener("input", e => fetchSuggestions(e.target.value, "dropoff-suggestions"));

    // ========== Set Markers ==========
    function setPickup(lat, lon, name) {
      document.getElementById("pickup").value = name;
      document.getElementById("pickup_latitude").value = lat;
      document.getElementById("pickup_longitude").value = lon;

      if (pickupMarker) pickupMarker.remove();
      pickupMarker = new maplibregl.Marker({ color: "green", draggable: true })
        .setLngLat([lon, lat])
        .addTo(map)
        .on("dragend", async () => {
          const pos = pickupMarker.getLngLat();
          const newName = await reverseGeocode(pos.lat, pos.lng);
          document.getElementById("pickup").value = newName;
          document.getElementById("pickup_latitude").value = pos.lat;
          document.getElementById("pickup_longitude").value = pos.lng;
          updateRoute();
        });
    }

    function setDropoff(lat, lon, name) {
      document.getElementById("dropoff").value = name;
      document.getElementById("dropoff_latitude").value = lat;
      document.getElementById("dropoff_longitude").value = lon;

      if (dropoffMarker) dropoffMarker.remove();
      dropoffMarker = new maplibregl.Marker({ color: "red", draggable: true })
        .setLngLat([lon, lat])
        .addTo(map)
        .on("dragend", async () => {
          const pos = dropoffMarker.getLngLat();
          const newName = await reverseGeocode(pos.lat, pos.lng);
          document.getElementById("dropoff").value = newName;
          document.getElementById("dropoff_latitude").value = pos.lat;
          document.getElementById("dropoff_longitude").value = pos.lng;
          updateRoute();
        });
    }

    // ========== Map click ==========
    map.on("click", async (e) => {
      const { lng, lat } = e.lngLat;
      const name = await reverseGeocode(lat, lng);

      if (selecting === "pickup") {
        setPickup(lat, lng, name);
        selecting = "dropoff";
      } else {
        setDropoff(lat, lng, name);
        selecting = "pickup";
      }

      updateRoute();
    });

    // ========== OSRM Route ==========
    async function updateRoute() {
      const pickupLat = document.getElementById("pickup_latitude").value;
      const pickupLon = document.getElementById("pickup_longitude").value;
      const dropLat = document.getElementById("dropoff_latitude").value;
      const dropLon = document.getElementById("dropoff_longitude").value;
      if (!pickupLat || !dropLat) return;

      try {
        const res = await fetch(`https://router.project-osrm.org/route/v1/driving/${pickupLon},${pickupLat};${dropLon},${dropLat}?overview=full&geometries=geojson`);
        const data = await res.json();
        const route = data.routes[0];
        const distanceKm = (route.distance / 1000).toFixed(2);
        const durationMin = (route.duration / 60).toFixed(1);

        document.getElementById("trip_distance").value = distanceKm;
        document.getElementById("trip_duration_min").value = durationMin;

        if (map.getSource("route")) {
          map.removeLayer("route");
          map.removeSource("route");
        }

        map.addSource("route", { type: "geojson", data: route.geometry });
        map.addLayer({
          id: "route",
          type: "line",
          source: "route",
          layout: { "line-cap": "round", "line-join": "round" },
          paint: { "line-color": "#007bff", "line-width": 5 }
        });

        map.fitBounds([[pickupLon, pickupLat], [dropLon, dropLat]], { padding: 50 });
      } catch (err) {
        console.error("Route update failed:", err);
      }
    }

    // ========== Auto Hour & Holiday Detection ==========
    function isUSHoliday(date) {
      const year = date.getFullYear();
      const month = date.getMonth() + 1;
      const day = date.getDate();

      const fixed = [
        "1-1", "7-4", "12-25"
      ];

      // Easter calculation
      const f = Math.floor, G = year % 19;
      const C = f(year / 100);
      const H = (C - f(C / 4) - f((8 * C + 13) / 25) + 19 * G + 15) % 30;
      const I = H - f(H / 28) * (1 - f(29 / (H + 1)) * f((21 - G) / 11));
      const J = (year + f(year / 4) + I + 2 - C + f(C / 4)) % 7;
      const L = I - J;
      const monthEaster = 3 + f((L + 40) / 44);
      const dayEaster = L + 28 - 31 * f(monthEaster / 4);

      return fixed.includes(`${month}-${day}`) || (month === monthEaster && day === dayEaster);
    }

    // ========== Predict Fare ==========
    document.getElementById("predictForm").addEventListener("submit", async e => {
      e.preventDefault();

      const now = new Date();
      const hour = now.getHours();
      const isWeekend = now.getDay() === 0 || now.getDay() === 6;
      const isHoliday = isUSHoliday(now);
      const weekendOrHoliday = isWeekend || isHoliday ? 1 : 0;

      const data = {
        trip_distance: parseFloat(document.getElementById("trip_distance").value),
        trip_duration_min: parseFloat(document.getElementById("trip_duration_min").value),
        pickup_latitude: parseFloat(document.getElementById("pickup_latitude").value),
        pickup_longitude: parseFloat(document.getElementById("pickup_longitude").value),
        dropoff_latitude: parseFloat(document.getElementById("dropoff_latitude").value),
        dropoff_longitude: parseFloat(document.getElementById("dropoff_longitude").value),
        pickup: document.getElementById("pickup").value,
        dropoff: document.getElementById("dropoff").value,
        hour_of_day: hour,
        is_weekend_or_holiday: weekendOrHoliday
      };

      try {
        const res = await fetch("/predict", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });
        const result = await res.json();
        const box = document.querySelector(".result-box");

        if (res.ok && result.predicted_fare) {
          document.getElementById("predictedFare").innerText = result.predicted_fare;
          box.style.display = "block";
        } else {
          alert(result.error || "Prediction failed!");
          box.style.display = "none";
        }
      } catch (err) {
        alert("Error: " + err.message);
      }
    });

 // ========== Dark Mode Toggle ==========
  const darkModeToggle = document.getElementById('darkModeToggle');

  // Apply saved preference on load
  if (localStorage.getItem('darkMode') === 'enabled') {
    document.body.classList.add('dark-mode');
    darkModeToggle.innerText = "☀️ Light Mode";
  } else {
    darkModeToggle.innerText = "🌙 Dark Mode";
  }

  // Toggle dark mode on click
  darkModeToggle.addEventListener('click', () => {
    document.body.classList.toggle('dark-mode');

    // Save preference and update button text
    if (document.body.classList.contains('dark-mode')) {
      localStorage.setItem('darkMode', 'enabled');
      darkModeToggle.innerText = "☀️ Light Mode";
    } else {
      localStorage.setItem('darkMode', 'disabled');
      darkModeToggle.innerText = "🌙 Dark Mode";
    }
  });

    
  </script>
</body>
</html>
