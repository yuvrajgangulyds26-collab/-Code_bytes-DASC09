<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login - Cab Fare Predictor</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(-45deg, #6a11cb, #2575fc, #ffb347, #ffcc70);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #fff;
    }

    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .login-container {
      background: rgba(0,0,0,0.5);
      padding: 40px;
      border-radius: 15px;
      width: 360px;
      text-align: center;
    }

    .login-container h2 {
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
    }

    .btn {
      width: 95%;
      padding: 12px;
      margin: 15px 0;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      font-size: 1.1rem;
      color: #fff;
      background: linear-gradient(135deg, #2196f3, #f44336);
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 15px rgba(0,0,0,0.3);
    }

    #error-msg {
      color: #ff8080;
      font-size: 0.9rem;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button class="btn" onclick="login()">Login</button>
    <div id="error-msg"></div>
    <p>Don't have an account? <a href="/signup" style="color:#ffd700;">Sign Up</a></p>
  </div>

  <script>
    function login() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('error-msg');
      errorDiv.textContent = '';

      if (!email || !password) {
        errorDiv.textContent = "Please fill all fields";
        return;
      }

      fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      })
      .then(res => res.json())
      .then(data => {
        if (data.error) {
          errorDiv.textContent = data.error;
        } else {
          // Login successful, redirect to dashboard
          window.location.href = "/dashboard";
        }
      })
      .catch(err => {
        errorDiv.textContent = "Error: " + err;
      });
    }
  </script>
</body>
</html>
