<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sign Up - Cab Fare Predictor</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(-45deg, #6a11cb, #2575fc, #ffb347, #ffcc70);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #fff;
    }

    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .signup-container {
      background: rgba(0,0,0,0.1);
      padding: 40px;
      border-radius: 15px;
      width: 360px;
      text-align: center;
    }

    .signup-container h2 {
      margin-bottom: 20px;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
    }

    .btn {
      width: 95%;
      padding: 12px;
      margin: 15px 0;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
      font-size: 1.1rem;
      color: #fff;
      background: linear-gradient(135deg, #2196f3, #f44336);
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 8px 15px rgba(0,0,0,0.3);
    }

    #otp-container {
      display: none;
      margin-top: 20px;
    }

    #resend-btn {
      background: linear-gradient(135deg, #ff9800, #ffc107);
      color: black;
    }

    .password-strength {
      font-size: 0.9rem;
      text-align: left;
      margin-left: 5%;
    }
  </style>
</head>
<body>
  <div class="signup-container">
    <h2>Create Account</h2>
    <input type="text" id="name" placeholder="Name">
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password" oninput="checkPasswordStrength()">
    <div class="password-strength" id="strength-msg"></div>
    <input type="password" id="confirm-password" placeholder="Confirm Password">
    <button class="btn" onclick="signup()">Sign Up</button>

    <div id="otp-container">
      <input type="text" id="otp-input" placeholder="Enter OTP">
      <button class="btn" onclick="verifyOTP()">Verify OTP</button>
      <button id="resend-btn" onclick="resendOTP()">Resend OTP</button>
    </div>
    <p>Already have an account? <a href="/login" style="color:#ffd700;">Login here</a></p>
  </div>

  <script>
    let generatedOTP = null;

    function signup() {
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm-password').value;

      if (!name || !email || !password || !confirm) {
        alert("Please fill all fields");
        return;
      }
      if (password !== confirm) {
        alert("Passwords do not match!");
        return;
      }

      generateOTP();
    }

    function generateOTP() {
      generatedOTP = Math.floor(1000 + Math.random() * 9000);
      alert("Your OTP is: " + generatedOTP + "\n(For demo, no email sent yet)");
      document.getElementById('otp-container').style.display = 'block';
      document.getElementById('resend-btn').style.display = 'none';
    }

    function verifyOTP() {
      const entered = document.getElementById('otp-input').value;
      if (entered == generatedOTP) {
        // Send signup data to backend
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;

        fetch('/api/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, password })
        })
        .then(res => res.json())
        .then(data => {
          if (data.error) {
            alert("Error: " + data.error);
          } else {
            alert("Signup successful!");
            window.location.href = "/dashboard";
          }
        })
        .catch(err => alert("Error: " + err));
      } else {
        alert("Incorrect OTP. Please try again.");
        document.getElementById('resend-btn').style.display = 'inline-block';
      }
    }

    function resendOTP() {
      generateOTP();
    }

    function checkPasswordStrength() {
      const pwd = document.getElementById('password').value;
      const msg = document.getElementById('strength-msg');
      let strength = '';

      if (pwd.length < 6) {
        strength = "Weak";
        msg.style.color = "red";
      } else if (/[A-Z]/.test(pwd) && /[0-9]/.test(pwd) && pwd.length >= 6) {
        strength = "Strong";
        msg.style.color = "green";
      } else {
        strength = "Moderate";
        msg.style.color = "orange";
      }
      msg.textContent = "Password Strength: " + strength;
    }
  </script>
</body>
</html>
